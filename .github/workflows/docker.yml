name: Build Backend

on:
  push:
    branches:
      - main 


permissions:
  contents: read
  packages: write

  
jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/backend:latest .

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/backend:latest

deploy:
  needs: build
  runs-on: self-hosted

  steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Log in to GHCR with Helm
        run: echo "${{ secrets.GHCR_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Deploy with Helm
        run: |
          helm upgrade -i backend oci://ghcr.io/zeinagab/backend-chart --version 0.1.0 --namespace helm-project -f helm-values/values.yaml --set image.tag=${{ github.sha }}
